<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>连连看 · 三十关</title>
<meta name="color-scheme" content="only dark">
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap');

/* ─── Force dark scheme, ignore browser dark mode ─── */
:root {
color-scheme: only dark;
–bg-dark: #0a0c10;
–bg-card: #151820;
–bg-board: #0d0f14;
–gold: #d4a853;
–gold-dim: #8a6d2b;
–jade: #4ecdc4;
–jade-dim: #2a7a74;
–red: #e74c3c;
–text: #e8e0d0;
–text-dim: #7a7468;
}

- { margin:0; padding:0; box-sizing:border-box; }

html, body {
background-color: #0a0c10 !important;
color: #e8e0d0 !important;
font-family: ‘Noto Sans SC’, sans-serif;
min-height: 100vh;
min-height: 100dvh;
overflow-x: hidden;
-webkit-text-size-adjust: 100%;
}

/* ─── Force portrait: hide game in landscape ─── */
#landscape-warn {
display: none;
position: fixed; inset: 0;
background: #0a0c10;
z-index: 9999;
justify-content: center;
align-items: center;
flex-direction: column;
gap: 16px;
color: #d4a853;
font-family: ‘Ma Shan Zheng’, cursive;
font-size: 1.5em;
text-align: center;
padding: 20px;
}
#landscape-warn .icon { font-size: 3em; }
@media (orientation: landscape) and (max-height: 500px) {
#landscape-warn { display: flex !important; }
#app, .overlay { display: none !important; }
}

/* Background texture */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 50%, rgba(78,205,196,0.03) 0%, transparent 50%),
radial-gradient(ellipse at 80% 50%, rgba(212,168,83,0.03) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

#app {
position: relative;
z-index: 1;
display: flex;
flex-direction: column;
align-items: center;
min-height: 100vh;
min-height: 100dvh;
padding: 6px 4px;
}

/* ─── Title ─── */
.game-title {
font-family: ‘Ma Shan Zheng’, cursive;
font-size: 1.8em;
color: #d4a853;
text-shadow: 0 0 20px rgba(212,168,83,0.3);
margin: 4px 0 2px;
letter-spacing: 0.1em;
}

/* ─── Top Bar ─── */
.top-bar {
display: flex;
align-items: center;
gap: 8px;
flex-wrap: wrap;
justify-content: center;
margin-bottom: 4px;
font-size: 0.82em;
width: 100%;
max-width: 420px;
}

.stat {
display: flex;
align-items: center;
gap: 3px;
color: #7a7468;
}
.stat .val {
color: #4ecdc4;
font-weight: 700;
font-size: 1.05em;
}
.stat.time .val { color: #d4a853; }

/* ─── Buttons ─── */
.btn {
border: 1px solid #8a6d2b;
background: rgba(212,168,83,0.08);
color: #d4a853 !important;
padding: 5px 10px;
border-radius: 4px;
cursor: pointer;
font-family: ‘Noto Sans SC’, sans-serif;
font-size: 0.82em;
transition: all 0.2s;
-webkit-tap-highlight-color: transparent;
}
.btn:hover, .btn:active {
background: rgba(212,168,83,0.2);
border-color: #d4a853;
}
.btn:disabled {
opacity: 0.3;
cursor: not-allowed;
}
.btn.hint-btn { border-color: #2a7a74; color: #4ecdc4 !important; background: rgba(78,205,196,0.08); }
.btn.hint-btn:hover, .btn.hint-btn:active { background: rgba(78,205,196,0.2); border-color: #4ecdc4; }

.btn-row {
display: flex;
gap: 6px;
justify-content: center;
flex-wrap: wrap;
}

/* ─── Board ─── */
.board-wrapper {
position: relative;
display: flex;
justify-content: center;
align-items: center;
margin-top: 4px;
}

canvas#gameCanvas {
border: 1px solid rgba(212,168,83,0.15);
border-radius: 6px;
background: #0d0f14;
cursor: pointer;
-webkit-tap-highlight-color: transparent;
touch-action: manipulation;
}

/* ─── Progress Bar ─── */
.progress-bar {
width: 100%; max-width: 160px; height: 5px;
background: #1a1d25;
border-radius: 3px;
overflow: hidden;
}
.progress-bar .fill {
height: 100%;
background: linear-gradient(90deg, #4ecdc4, #d4a853);
border-radius: 3px;
transition: width 0.4s;
}

/* ─── Overlays ─── */
.overlay {
position: fixed;
inset: 0;
background: rgba(10,12,16,0.94);
display: flex;
justify-content: center;
align-items: center;
z-index: 100;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}
.overlay.active { opacity: 1; pointer-events: all; }

/* Force all overlay/modal colors explicitly to resist dark mode inversion */
.modal {
background: #151820 !important;
border: 1px solid #8a6d2b;
border-radius: 12px;
padding: 24px 20px;
text-align: center;
max-width: 380px;
width: 92%;
max-height: 88vh;
max-height: 88dvh;
overflow-y: auto;
color: #e8e0d0 !important;
}
.modal h2 {
font-family: ‘Ma Shan Zheng’, cursive;
font-size: 1.8em;
color: #d4a853 !important;
margin-bottom: 10px;
}
.modal p {
color: #7a7468 !important;
margin-bottom: 16px;
line-height: 1.6;
}
.modal .btn { font-size: 0.95em; padding: 8px 22px; }

.stars { font-size: 1.8em; margin-bottom: 8px; }

/* ─── Level Select Grid ─── */
.level-grid {
display: grid;
grid-template-columns: repeat(6, 1fr);
gap: 8px;
margin: 12px 0;
justify-items: center;
}
.level-cell {
width: 46px; height: 46px;
border: 1px solid #8a6d2b;
border-radius: 8px;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
cursor: pointer;
background: rgba(212,168,83,0.05) !important;
transition: all 0.2s;
font-size: 1em;
font-weight: 700;
color: #d4a853 !important;
-webkit-tap-highlight-color: transparent;
}
.level-cell:hover, .level-cell:active { background: rgba(212,168,83,0.15) !important; border-color: #d4a853; }
.level-cell.locked {
opacity: 0.3;
cursor: not-allowed;
color: #555 !important;
border-color: #333;
}
.level-cell .cell-stars { font-size: 0.45em; margin-top: 1px; }
.level-cell.current { border-color: #4ecdc4; color: #4ecdc4 !important; box-shadow: 0 0 10px rgba(78,205,196,0.25); }

/* ─── Link animation canvas ─── */
canvas#linkCanvas {
position: absolute;
top: 0; left: 0;
pointer-events: none;
z-index: 10;
}

/* ─── Cheat button area ─── */
.cheat-area {
margin-top: 14px;
border-top: 1px solid #252525;
padding-top: 10px;
}
.cheat-btn-style {
font-size: 0.75em !important;
opacity: 0.45;
border-color: #444 !important;
color: #777 !important;
padding: 5px 14px;
}
.cheat-btn-style.active {
opacity: 1;
border-color: #e74c3c !important;
color: #e74c3c !important;
}

/* ─── Mobile tweaks ─── */
@media (max-width: 400px) {
.game-title { font-size: 1.4em; }
.top-bar { font-size: 0.76em; gap: 6px; }
.modal { padding: 18px 14px; }
.level-cell { width: 40px; height: 40px; font-size: 0.9em; }
.level-grid { gap: 5px; }
}
</style>

</head>
<body>

<!-- Landscape warning -->

<div id="landscape-warn">
  <div class="icon">📱</div>
  <div>请旋转手机至竖屏模式</div>
  <div style="font-size:0.6em;color:#7a7468;font-family:'Noto Sans SC',sans-serif;">本游戏仅支持竖屏</div>
</div>

<div id="app">
  <div class="game-title">连 连 看</div>
  <div class="top-bar">
    <span class="stat">第<span class="val" id="levelNum">1</span>关</span>
    <span class="stat time">⏱<span class="val" id="timer">0</span>s</span>
    <span class="stat">剩<span class="val" id="pairsLeft">0</span>对</span>
    <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <div class="btn-row">
    <button class="btn hint-btn" id="hintBtn" onclick="useHint()">💡提示(<span id="hintCount">3</span>)</button>
    <button class="btn" onclick="shuffleBoard()">🔀重排</button>
    <button class="btn" onclick="showLevelSelect()">📋选关</button>
  </div>

  <div class="board-wrapper">
    <canvas id="gameCanvas"></canvas>
    <canvas id="linkCanvas"></canvas>
  </div>
</div>

<!-- Win Overlay -->

<div class="overlay" id="winOverlay">
  <div class="modal">
    <div class="stars" id="winStars"></div>
    <h2 id="winTitle">过关！</h2>
    <p id="winMsg"></p>
    <button class="btn" onclick="nextLevel()" id="nextBtn">下一关 →</button>
    <button class="btn" onclick="showLevelSelect()" style="margin-left:6px">选关</button>
  </div>
</div>

<!-- Level Select Overlay -->

<div class="overlay" id="levelOverlay">
  <div class="modal">
    <h2>选择关卡</h2>
    <div class="level-grid" id="levelGrid"></div>
    <button class="btn" onclick="closeLevelSelect()">返回</button>
    <div class="cheat-area">
      <button class="btn cheat-btn-style" id="cheatBtn">🔓 作弊模式</button>
    </div>
  </div>
</div>

<!-- All-Clear Overlay -->

<div class="overlay" id="allClearOverlay">
  <div class="modal">
    <h2>🎉 全部通关！</h2>
    <p>恭喜你完成了全部30关！<br>你是连连看大师！</p>
    <button class="btn" onclick="resetAll()">重新开始</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  连连看 - 30 Levels
// ══════════════════════════════════════════════
const TOTAL_LEVELS = 30;

// ─── Emoji sets by theme (18 each, high-contrast distinct emojis) ───
const EMOJI_SETS = [
  ['🍎','🍊','🍋','🍇','🍉','🍓','🍑','🍒','🥝','🍍','🥭','🍌','🫐','🍈','🥥','🍐','🍅','🥑'],
  ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🦄','🐔','🦋'],
  ['🌸','🌺','🌻','🌹','🌷','💐','🌿','🍀','🌴','🌵','🍁','🍂','🌾','🌼','🪷','🌳','🎋','🪴'],
  ['🍕','🍔','🍟','🌭','🍿','🧁','🍩','🍪','🎂','🍫','🍬','🍭','🧀','🥐','🥨','🍰','🥞','🍣'],
  ['⚽','🏀','🏈','⚾','🎾','🏐','🎱','🏓','🏸','🥊','⛳','🎯','🏹','🛹','🥋','🏄','🚴','🎿'],
  ['💎','🔮','🎪','🎭','🎨','🎬','🎤','🎵','🎸','🎺','🥁','🎲','🧩','🎰','🔔','🏆','👑','🗝️'],
];

// ─── Level configs: 30 levels ───
// Design: all boards must fit portrait phone (max ~6-7 cols, many rows OK)
// Gradually increase cols (4→6→7→8) and rows (4→6→8→10)
const LEVEL_DEFS = [
  // 1-5: easy, small boards
  { cols:4, rows:4, types:4  },  // 1:  16 cells, 8 pairs
  { cols:4, rows:4, types:5  },  // 2
  { cols:4, rows:6, types:5  },  // 3:  24 cells
  { cols:4, rows:6, types:6  },  // 4
  { cols:6, rows:4, types:6  },  // 5:  24 cells

  // 6-10: medium-easy
  { cols:6, rows:4, types:7  },  // 6
  { cols:6, rows:6, types:7  },  // 7:  36 cells
  { cols:6, rows:6, types:8  },  // 8
  { cols:6, rows:6, types:9  },  // 9
  { cols:6, rows:8, types:8  },  // 10: 48 cells

  // 11-15: medium
  { cols:6, rows:8, types:9  },  // 11
  { cols:6, rows:8, types:10 },  // 12
  { cols:6, rows:10,types:10 },  // 13: 60 cells
  { cols:6, rows:10,types:11 },  // 14
  { cols:8, rows:6, types:10 },  // 15: 48 cells (wider)

  // 16-20: medium-hard
  { cols:8, rows:6, types:11 },  // 16
  { cols:8, rows:8, types:11 },  // 17: 64 cells
  { cols:8, rows:8, types:12 },  // 18
  { cols:8, rows:8, types:13 },  // 19
  { cols:8, rows:10,types:12 },  // 20: 80 cells

  // 21-25: hard
  { cols:8, rows:10,types:13 },  // 21
  { cols:8, rows:10,types:14 },  // 22
  { cols:8, rows:10,types:15 },  // 23
  { cols:8, rows:12,types:14 },  // 24: 96 cells
  { cols:8, rows:12,types:15 },  // 25

  // 26-30: very hard
  { cols:8, rows:12,types:16 },  // 26
  { cols:8, rows:14,types:15 },  // 27: 112 cells
  { cols:8, rows:14,types:16 },  // 28
  { cols:8, rows:14,types:17 },  // 29
  { cols:8, rows:14,types:18 },  // 30: 112 cells, 18 types
];

const LEVELS = LEVEL_DEFS.map((def, i) => ({
  cols: def.cols,
  rows: def.rows,
  types: Math.min(def.types, EMOJI_SETS[i % EMOJI_SETS.length].length),
  emojiSet: i % EMOJI_SETS.length,
}));

// ─── Game State ───
let currentLevel = 0;
let board = [];
let boardRows = 0;
let boardCols = 0;
let totalPairs = 0;
let pairsRemaining = 0;
let selected = null;
let hints = 3;
let timerVal = 0;
let timerInterval = null;
let animating = false;
let levelStars = new Array(TOTAL_LEVELS).fill(0);
let unlockedLevel = 0;
let cheatMode = false;

// Canvas
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const linkCanvas = document.getElementById('linkCanvas');
const linkCtx = linkCanvas.getContext('2d');

let CELL = 52;
const GAP = 2;

function calcCellSize() {
  const maxW = window.innerWidth - 12;
  // Reserve space for title + top bar + buttons (~110px) and some bottom padding
  const maxH = window.innerHeight - 120;
  const cellW = Math.floor((maxW - (boardCols - 1) * GAP) / boardCols);
  const cellH = Math.floor((maxH - (boardRows - 1) * GAP) / boardRows);
  CELL = Math.max(30, Math.min(56, cellW, cellH));
}

// ─── Load/Save progress ───
function loadProgress() {
  try {
    const d = JSON.parse(localStorage.getItem('llk_progress_v2') || '{}');
    if (d.stars && d.stars.length >= TOTAL_LEVELS) levelStars = d.stars;
    if (typeof d.unlocked === 'number') unlockedLevel = d.unlocked;
  } catch(e) {}
}
function saveProgress() {
  localStorage.setItem('llk_progress_v2', JSON.stringify({ stars: levelStars, unlocked: unlockedLevel }));
}

// ─── Init Level ───
function initLevel(lvl) {
  currentLevel = lvl;
  const cfg = LEVELS[lvl];
  boardCols = cfg.cols;
  boardRows = cfg.rows;
  hints = 3;
  selected = null;
  animating = false;
  timerVal = 0;
  clearInterval(timerInterval);

  const totalCells = boardCols * boardRows;
  totalPairs = totalCells / 2;
  pairsRemaining = totalPairs;

  const emojis = EMOJI_SETS[cfg.emojiSet].slice(0, cfg.types);
  let pool = [];
  const pairsPerType = Math.floor(totalPairs / cfg.types);
  const extra = totalPairs % cfg.types;
  for (let t = 0; t < cfg.types; t++) {
    const count = pairsPerType + (t < extra ? 1 : 0);
    for (let k = 0; k < count; k++) {
      pool.push(t, t);
    }
  }
  shuffle(pool);

  board = [];
  let idx = 0;
  for (let r = 0; r < boardRows; r++) {
    board[r] = [];
    for (let c = 0; c < boardCols; c++) {
      board[r][c] = pool[idx++];
    }
  }

  calcCellSize();
  resizeCanvas();
  updateUI();
  drawBoard();

  timerInterval = setInterval(() => {
    timerVal++;
    document.getElementById('timer').textContent = timerVal;
  }, 1000);
}

function resizeCanvas() {
  const w = boardCols * CELL + (boardCols - 1) * GAP;
  const h = boardRows * CELL + (boardRows - 1) * GAP;
  const dpr = window.devicePixelRatio || 1;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  linkCanvas.style.width = w + 'px';
  linkCanvas.style.height = h + 'px';
  linkCanvas.width = w * dpr;
  linkCanvas.height = h * dpr;
  linkCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function updateUI() {
  document.getElementById('levelNum').textContent = currentLevel + 1;
  document.getElementById('pairsLeft').textContent = pairsRemaining;
  document.getElementById('hintCount').textContent = hints;
  document.getElementById('hintBtn').disabled = hints <= 0;
  const pct = totalPairs > 0 ? ((totalPairs - pairsRemaining) / totalPairs * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ─── Drawing ───
function cellX(c) { return c * (CELL + GAP); }
function cellY(r) { return r * (CELL + GAP); }

function drawBoard() {
  const w = boardCols * CELL + (boardCols - 1) * GAP;
  const h = boardRows * CELL + (boardRows - 1) * GAP;
  ctx.clearRect(0, 0, w, h);

  const cfg = LEVELS[currentLevel];
  const emojis = EMOJI_SETS[cfg.emojiSet];
  const emojiSize = Math.max(18, Math.floor(CELL * 0.6));
  const radius = Math.max(3, Math.floor(CELL * 0.12));

  for (let r = 0; r < boardRows; r++) {
    for (let c = 0; c < boardCols; c++) {
      const v = board[r][c];
      if (v < 0) continue;
      const x = cellX(c), y = cellY(r);
      const isSel = selected && selected.r === r && selected.c === c;

      // Card bg
      ctx.fillStyle = isSel ? 'rgba(212,168,83,0.22)' : 'rgba(255,255,255,0.05)';
      ctx.strokeStyle = isSel ? '#d4a853' : 'rgba(255,255,255,0.1)';
      ctx.lineWidth = isSel ? 2 : 1;
      roundRect(ctx, x, y, CELL, CELL, radius, true, true);

      if (isSel) {
        ctx.shadowColor = 'rgba(212,168,83,0.4)';
        ctx.shadowBlur = 8;
        roundRect(ctx, x, y, CELL, CELL, radius, false, true);
        ctx.shadowBlur = 0;
      }
      ctx.lineWidth = 1;

      // Emoji — draw centered
      ctx.font = emojiSize + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#fff';
      ctx.fillText(emojis[v], x + CELL / 2, y + CELL / 2 + 1);
    }
  }
}

function roundRect(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

// ─── Click / Tap ───
canvas.addEventListener('click', (e) => {
  if (animating) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const c = Math.floor(mx / (CELL + GAP));
  const r = Math.floor(my / (CELL + GAP));

  if (r < 0 || r >= boardRows || c < 0 || c >= boardCols) return;
  if (board[r][c] < 0) return;

  const cx = cellX(c), cy = cellY(r);
  if (mx < cx || mx > cx + CELL || my < cy || my > cy + CELL) return;

  if (!selected) {
    selected = {r, c};
    drawBoard();
    return;
  }

  if (selected.r === r && selected.c === c) {
    selected = null;
    drawBoard();
    return;
  }

  if (board[selected.r][selected.c] === board[r][c]) {
    const path = findPath(selected.r, selected.c, r, c);
    if (path) {
      animateLink(path, () => {
        board[selected.r][selected.c] = -1;
        board[r][c] = -1;
        pairsRemaining--;
        selected = null;
        updateUI();
        drawBoard();
        if (pairsRemaining === 0) levelComplete();
      });
      return;
    }
  }

  selected = {r, c};
  drawBoard();
});

// ─── Pathfinding (≤2 turns) ───
function isEmptyOrTarget(r, c, tr, tc) {
  if (r < 0 || r > boardRows + 1 || c < 0 || c > boardCols + 1) return false;
  if (r === 0 || r === boardRows + 1 || c === 0 || c === boardCols + 1) return true;
  const br = r - 1, bc = c - 1;
  if (br === tr && bc === tc) return true;
  return board[br][bc] < 0;
}

function findPath(r1, c1, r2, c2) {
  const pr1 = r1+1, pc1 = c1+1, pr2 = r2+1, pc2 = c2+1;
  const s = tryStraight(pr1,pc1,pr2,pc2,r2,c2);
  if (s) return s.map(p=>[p[0]-1,p[1]-1]);
  const o = tryOneTurn(pr1,pc1,pr2,pc2,r2,c2);
  if (o) return o.map(p=>[p[0]-1,p[1]-1]);
  const t = tryTwoTurns(pr1,pc1,pr2,pc2,r2,c2);
  if (t) return t.map(p=>[p[0]-1,p[1]-1]);
  return null;
}

function tryStraight(r1,c1,r2,c2,tr,tc) {
  if (r1===r2) {
    const mn=Math.min(c1,c2), mx=Math.max(c1,c2);
    for (let c=mn+1;c<mx;c++) if(!isEmptyOrTarget(r1,c,tr,tc)) return null;
    return [[r1,c1],[r2,c2]];
  }
  if (c1===c2) {
    const mn=Math.min(r1,r2), mx=Math.max(r1,r2);
    for (let r=mn+1;r<mx;r++) if(!isEmptyOrTarget(r,c1,tr,tc)) return null;
    return [[r1,c1],[r2,c2]];
  }
  return null;
}

function canWalkH(r,c1,c2,tr,tc) {
  const mn=Math.min(c1,c2), mx=Math.max(c1,c2);
  for(let c=mn;c<=mx;c++){if(c===c1)continue;if(!isEmptyOrTarget(r,c,tr,tc))return false;}return true;
}
function canWalkV(c,r1,r2,tr,tc) {
  const mn=Math.min(r1,r2), mx=Math.max(r1,r2);
  for(let r=mn;r<=mx;r++){if(r===r1)continue;if(!isEmptyOrTarget(r,c,tr,tc))return false;}return true;
}

function tryOneTurn(r1,c1,r2,c2,tr,tc) {
  if (isEmptyOrTarget(r1,c2,tr,tc) && canWalkH(r1,c1,c2,tr,tc) && canWalkV(c2,r1,r2,tr,tc))
    return [[r1,c1],[r1,c2],[r2,c2]];
  if (isEmptyOrTarget(r2,c1,tr,tc) && canWalkV(c1,r1,r2,tr,tc) && canWalkH(r2,c1,c2,tr,tc))
    return [[r1,c1],[r2,c1],[r2,c2]];
  return null;
}

function tryTwoTurns(r1,c1,r2,c2,tr,tc) {
  for (let c=0;c<=boardCols+1;c++) {
    if(c===c1&&c===c2) continue;
    if(!isEmptyOrTarget(r1,c,tr,tc)&&!(r1-1===tr&&c-1===tc)) continue;
    if(!isEmptyOrTarget(r2,c,tr,tc)&&!(r2-1===tr&&c-1===tc)) continue;
    if(canWalkH(r1,c1,c,tr,tc)&&canWalkV(c,r1,r2,tr,tc)&&canWalkH(r2,c,c2,tr,tc))
      return [[r1,c1],[r1,c],[r2,c],[r2,c2]];
  }
  for (let r=0;r<=boardRows+1;r++) {
    if(r===r1&&r===r2) continue;
    if(!isEmptyOrTarget(r,c1,tr,tc)&&!(r-1===tr&&c1-1===tc)) continue;
    if(!isEmptyOrTarget(r,c2,tr,tc)&&!(r-1===tr&&c2-1===tc)) continue;
    if(canWalkV(c1,r1,r,tr,tc)&&canWalkH(r,c1,c2,tr,tc)&&canWalkV(c2,r,r2,tr,tc))
      return [[r1,c1],[r,c1],[r,c2],[r2,c2]];
  }
  return null;
}

// ─── Link Animation ───
function animateLink(path, onDone) {
  animating = true;
  const pts = path.map(([r,c])=>({ x:cellX(c)+CELL/2, y:cellY(r)+CELL/2 }));
  const w = parseInt(linkCanvas.style.width);
  const h = parseInt(linkCanvas.style.height);
  let alpha = 1;
  const draw = () => {
    linkCtx.clearRect(0,0,w,h);
    linkCtx.strokeStyle = `rgba(78,205,196,${alpha})`;
    linkCtx.lineWidth = 3;
    linkCtx.lineJoin = 'round';
    linkCtx.beginPath();
    linkCtx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) linkCtx.lineTo(pts[i].x,pts[i].y);
    linkCtx.stroke();
    linkCtx.strokeStyle = `rgba(78,205,196,${alpha*0.3})`;
    linkCtx.lineWidth = 8;
    linkCtx.beginPath();
    linkCtx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) linkCtx.lineTo(pts[i].x,pts[i].y);
    linkCtx.stroke();
  };
  draw();
  setTimeout(()=>{ alpha=0.5; draw(); setTimeout(()=>{ linkCtx.clearRect(0,0,w,h); animating=false; onDone(); },120); },180);
}

// ─── Find any valid pair ───
function findAnyPair() {
  const cells=[];
  for(let r=0;r<boardRows;r++) for(let c=0;c<boardCols;c++) if(board[r][c]>=0) cells.push({r,c,v:board[r][c]});
  const groups={};
  cells.forEach(cell=>{ if(!groups[cell.v]) groups[cell.v]=[]; groups[cell.v].push(cell); });
  for(const v in groups){
    const g=groups[v];
    for(let i=0;i<g.length;i++) for(let j=i+1;j<g.length;j++)
      if(findPath(g[i].r,g[i].c,g[j].r,g[j].c)) return [g[i],g[j]];
  }
  return null;
}

// ─── Hint ───
function useHint() {
  if(hints<=0||animating) return;
  const pair=findAnyPair();
  if(!pair){ shuffleBoard(); return; }
  hints--;
  updateUI();
  selected=pair[0];
  drawBoard();
  setTimeout(()=>{
    const x2=cellX(pair[1].c), y2=cellY(pair[1].r);
    ctx.strokeStyle='#4ecdc4';
    ctx.lineWidth=2;
    ctx.shadowColor='rgba(78,205,196,0.5)';
    ctx.shadowBlur=8;
    roundRect(ctx,x2,y2,CELL,CELL,Math.max(3,Math.floor(CELL*0.12)),false,true);
    ctx.shadowBlur=0;
    ctx.lineWidth=1;
  },50);
}

// ─── Shuffle ───
function shuffleBoard() {
  const vals=[];
  for(let r=0;r<boardRows;r++) for(let c=0;c<boardCols;c++) if(board[r][c]>=0) vals.push(board[r][c]);
  shuffle(vals);
  let idx=0;
  for(let r=0;r<boardRows;r++) for(let c=0;c<boardCols;c++) if(board[r][c]>=0) board[r][c]=vals[idx++];
  selected=null;
  drawBoard();
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
}

// ─── Level Complete ───
function levelComplete() {
  clearInterval(timerInterval);
  const cfg=LEVELS[currentLevel];
  const cellCount=cfg.rows*cfg.cols;
  const par=cellCount*1.2;
  let stars=3;
  if(timerVal>par*1.5) stars=2;
  if(timerVal>par*2.5) stars=1;
  if(stars>levelStars[currentLevel]) levelStars[currentLevel]=stars;
  if(currentLevel+1>unlockedLevel && currentLevel<TOTAL_LEVELS-1) unlockedLevel=currentLevel+1;
  saveProgress();

  document.getElementById('winStars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('winTitle').textContent=currentLevel===TOTAL_LEVELS-1?'🎉 全部通关！':'过关！';
  document.getElementById('winMsg').textContent=`用时 ${timerVal} 秒`;
  document.getElementById('nextBtn').style.display=currentLevel<TOTAL_LEVELS-1?'':'none';
  document.getElementById('winOverlay').classList.add('active');
}

function nextLevel() {
  document.getElementById('winOverlay').classList.remove('active');
  if(currentLevel<TOTAL_LEVELS-1) initLevel(currentLevel+1);
}

// ─── Level Select ───
function buildLevelGrid() {
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  const effectiveUnlocked=cheatMode?TOTAL_LEVELS-1:unlockedLevel;
  for(let i=0;i<TOTAL_LEVELS;i++){
    const cell=document.createElement('div');
    cell.className='level-cell';
    if(i>effectiveUnlocked) cell.classList.add('locked');
    if(i===currentLevel) cell.classList.add('current');
    cell.innerHTML=`${i+1}<div class="cell-stars">${levelStars[i]>0?'⭐'.repeat(levelStars[i]):''}</div>`;
    if(i<=effectiveUnlocked){
      cell.addEventListener('click',()=>{
        closeLevelSelect();
        document.getElementById('winOverlay').classList.remove('active');
        initLevel(i);
      });
    }
    grid.appendChild(cell);
  }
}

function showLevelSelect() {
  buildLevelGrid();
  updateCheatBtn();
  document.getElementById('levelOverlay').classList.add('active');
}

function toggleCheat() {
  cheatMode=!cheatMode;
  buildLevelGrid();
  updateCheatBtn();
}

function updateCheatBtn() {
  const cb=document.getElementById('cheatBtn');
  if(cheatMode){
    cb.classList.add('active');
    cb.innerText='🔓 作弊模式 ON';
  } else {
    cb.classList.remove('active');
    cb.innerText='🔓 作弊模式';
  }
}

document.getElementById('cheatBtn').addEventListener('click',function(e){
  e.stopPropagation();
  e.preventDefault();
  toggleCheat();
});

function closeLevelSelect(){ document.getElementById('levelOverlay').classList.remove('active'); }

function resetAll(){
  levelStars.fill(0);
  unlockedLevel=0;
  saveProgress();
  document.getElementById('allClearOverlay').classList.remove('active');
  document.getElementById('winOverlay').classList.remove('active');
  initLevel(0);
}

// ─── Boot ───
loadProgress();
initLevel(unlockedLevel);

window.addEventListener('resize',()=>{
  if(boardCols>0){
    calcCellSize();
    resizeCanvas();
    drawBoard();
  }
});
</script>
